name: Renma CI Report

on:
  pull_request:

env:
  # Replace this with a canonical Skill ID from your repository.
  RENMA_SKILL_FOCUS: skill.release-prep

jobs:
  generate-renma-reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - name: Generate Renma inventory reports
        run: |
          mkdir -p renma-reports
          node dist/index.js catalog . \
            --format markdown > renma-reports/catalog.md
          node dist/index.js graph . \
            --focus "${RENMA_SKILL_FOCUS}" \
            --view composition \
            --format markdown > renma-reports/skill-composition.md

      - name: Generate Renma CI report
        id: ci-report
        continue-on-error: true
        run: |
          node dist/index.js ci-report . \
            --from origin/${{ github.base_ref }} \
            --to HEAD \
            --format markdown > renma-reports/ci-report.md

      - name: Validate Renma Skills and Context
        id: scan
        continue-on-error: true
        run: node dist/index.js scan . --fail-on high

      - name: Upload Renma Skill reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: renma-skill-reports
          path: renma-reports/
          if-no-files-found: ignore

      - name: Enforce Renma result
        if: >-
          steps.ci-report.outcome == 'failure' ||
          steps.scan.outcome == 'failure'
        run: exit 1

  # Keep pull-request write permission out of the job that runs repository code.
  # Fork PRs retain the uploaded artifact but skip this write-capable job.
  comment-renma-ci-report:
    needs: generate-renma-reports
    if: >-
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Download Renma Skill reports
        id: download-reports
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: renma-skill-reports
          path: renma-reports

      - name: Comment Renma CI report on pull request
        if: >-
          steps.download-reports.outcome == 'success' &&
          hashFiles('renma-reports/ci-report.md') != ''
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          RENMA_CI_REPORT_PATH: renma-reports/ci-report.md
        with:
          script: |
            const { readFileSync } = require("node:fs");
            const marker = "<!-- renma-ci-report -->";
            const report = readFileSync(process.env.RENMA_CI_REPORT_PATH, "utf8").trim();
            const body = `${marker}\n${report}\n`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find(
              (comment) =>
                comment.user?.login === "github-actions[bot]" &&
                comment.body?.startsWith(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
