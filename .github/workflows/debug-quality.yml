name: Debug Quality Output

on:
  pull_request:
    branches: [main]

jobs:
  capture-quality:
    name: Capture quality output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw npm install

      - name: Capture quality commands
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          echo "exit_code=$?" >> typecheck.log
          npm run format:check > format.log 2>&1
          echo "exit_code=$?" >> format.log
          npm run build > build.log 2>&1
          echo "exit_code=$?" >> build.log
          npm run test > test.log 2>&1
          echo "exit_code=$?" >> test.log
          exit 0

      - name: Upload quality output
        uses: actions/upload-artifact@v4
        with:
          name: quality-output
          path: '*.log'
          if-no-files-found: error
