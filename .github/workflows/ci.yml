name: Code Quality and Unit Tests

on:
  pull_request:
    branches: [main]

env:
  RENMA_SKILL_FOCUS: skill.release-prep

jobs:
  lint-format-and-test:
    name: ESLint, Prettier, and Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw npm install

      - name: List installed packages
        run: npm list --depth=0

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeCheck
        run: npm run typecheck

      - name: Run Prettier check
        run: npm run format:check

      - run: npm run build
        name: Build

      - name: Run Unit Tests
        run: npm run test

      - name: Verify package contents
        run: npm run verify:package

      - name: Validate Renma Skills and Context
        run: node dist/index.js scan . --fail-on high

      - name: Generate Renma Skill reports
        run: |
          mkdir -p renma-reports
          node dist/index.js catalog . \
            --format markdown > renma-reports/catalog.md
          node dist/index.js graph . \
            --focus "${RENMA_SKILL_FOCUS}" \
            --view composition \
            --format markdown > renma-reports/skill-composition.md
          node dist/index.js ci-report . \
            --from origin/${{ github.base_ref }} \
            --to HEAD \
            --format markdown > renma-reports/ci-report.md

      - name: Comment Renma CI report on pull request
        if: >-
          always() &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          hashFiles('renma-reports/ci-report.md') != ''
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          RENMA_CI_REPORT_PATH: renma-reports/ci-report.md
        with:
          script: |
            const { readFileSync } = require("node:fs");
            const marker = "<!-- renma-ci-report -->";
            const report = readFileSync(process.env.RENMA_CI_REPORT_PATH, "utf8").trim();
            const body = `${marker}\n${report}\n`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find(
              (comment) =>
                comment.user?.login === "github-actions[bot]" &&
                comment.body?.startsWith(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload Renma Skill reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renma-skill-reports
          path: renma-reports/
          if-no-files-found: ignore
